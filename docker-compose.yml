x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  identifier:
    image: semtech/mu-identifier:1.11.0
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  dispatcher:
    image: semtech/mu-dispatcher:2.1.0-beta.2
    volumes:
      - ./config/dispatcher:/config
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  database:
    image: semtech/sparql-parser:0.0.14
    volumes:
      - ./config/authorization:/config
      - ./data/authorization:/data
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  virtuoso:
    image: redpencil/virtuoso:1.3.0
    environment:
      SPARQL_UPDATE: "true"
    volumes:
      - ./config/virtuoso/virtuoso.ini:/data/virtuoso.ini
      - ./data/db:/data
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  resource:
    image: semtech/mu-cl-resources:1.27.1
    volumes:
      - ./config/resources:/config
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  file:
    image: semtech/mu-file-service:3.4.0
    volumes:
      - ./data/files:/share
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  consumer-1:
    image: lblod/delta-consumer:0.0.26
    depends_on:
      - database
      - virtuoso
    restart: always
    volumes:
      - ./config/consumer/besluiten:/config/triples-dispatching/custom-dispatching
    environment:
      DCR_SERVICE_NAME: consumer-1
      DCR_CRON_PATTERN_DELTA_SYNC: 0 * * * * # Every hour
      DCR_START_FROM_DELTA_TIMESTAMP: 2025-09-01T00:00:00
      DCR_SYNC_BASE_URL: https://lokaalbeslist-harvester-1.s.redhost.be/
      DCR_SYNC_FILES_PATH: /sync/besluiten/files
      DCR_SYNC_DATASET_SUBJECT: http://data.lblod.info/datasets/delta-producer/dumps/lblod-harvester/BesluitenCacheGraphDump
      DCR_INITIAL_SYNC_JOB_OPERATION: http://redpencil.data.gift/id/jobs/concept/JobOperation/deltas/consumer/initialSync/besluiten
      DCR_DELTA_SYNC_JOB_OPERATION: http://redpencil.data.gift/id/jobs/concept/JobOperation/deltas/consumer/besluitenSyncing
      DCR_JOB_CREATOR_URI: http://data.lblod.info/services/id/besluiten-consumer
      DCR_DISABLE_INITIAL_SYNC: true
      DCR_WAIT_FOR_INITIAL_SYNC: false
      DCR_DISABLE_DELTA_INGEST: false
      INGEST_GRAPH: http://mu.semte.ch/graphs/public
      BATCH_SIZE: 500
    logging: *default-logging
    labels:
      - logging=true