x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  identifier:
    image: semtech/mu-identifier:1.11.0
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  dispatcher:
    image: semtech/mu-dispatcher:2.1.0-beta.2
    volumes:
      - ./config/dispatcher:/config
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  database:
    image: semtech/sparql-parser:0.0.14
    volumes:
      - ./config/authorization:/config
      - ./data/authorization:/data
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  virtuoso:
    image: redpencil/virtuoso:1.3.0
    environment:
      SPARQL_UPDATE: "true"
    volumes:
      - ./config/virtuoso/virtuoso.ini:/data/virtuoso.ini
      - ./data/db:/data
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  resource:
    image: semtech/mu-cl-resources:1.27.1
    volumes:
      - ./config/resources:/config
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  file:
    image: semtech/mu-file-service:3.4.0
    volumes:
      - ./data/files:/share
    labels:
      - "logging=true"
    restart: always
    logging: *default-logging
  project-scripts:
    image: semtech/simple-script-store:1.0.0
    volumes:
      - ./scripts/:/app/scripts/
    restart: "no"
  odrl-parser:
    image: lblod/odrl-parser-service:0.0.3
    volumes:
      - ./config/odrl-parser:/config
  migrations:
    image: semtech/mu-migrations-service:0.9.0
    links:
      - virtuoso:database
    volumes:
      - ./config/migrations:/data/migrations
  vc-issuer:
    image: lblod/oid4vc-login-service:latest
    environment:
      ISSUER_DID: did:web:example.com:some:did
      ISSUER_KEY_ID: did:web:example.com:some:did#somekey
      VERIFIER_DID: did:web:example.com:some:did
      VERIFIER_KEY_ID: did:web:example.com:some:did#id
      ISSUER_PUBLIC_KEY: notatallsecretkey
      ISSUER_PRIVATE_KEY: superultrasecretkey
      ISSUER_URL: https://example.com/vc-issuer
      VERIFIER_URL: https://example.com/vc-verifier
      LOGO_URL: https://example.com/assets/logo.png
      CREDENTIAL_TYPE: DecideCredential
      NO_DID_PREFIX: true
      SINGLE_CREDENTIAL_RESPONSE: true
  lokaal-beslist-consumer:
    image: lblod/delta-consumer:feature-initial-sync-with-virtuoso-dump
    environment:
      DCR_SERVICE_NAME: lokaal-beslist-consumer
      DCR_SYNC_BASE_URL: https://lokaalbeslist-harvester-1.s.redhost.be/ # Harvester 1 hosts Ghent decisions
      DCR_SYNC_FILES_PATH: /sync/besluiten/files
      DCR_SYNC_DATASET_SUBJECT: http://data.lblod.info/datasets/delta-producer/dumps/lblod-harvester/BesluitenCacheGraphDump
      DCR_INITIAL_SYNC_JOB_OPERATION: http://redpencil.data.gift/id/jobs/concept/JobOperation/deltas/consumer/initialSync/decisions-lokaal-beslist
      DCR_DELTA_SYNC_JOB_OPERATION: http://redpencil.data.gift/id/jobs/concept/JobOperation/deltas/consumer/deltaSync/decisions-ghent
      DCR_JOB_CREATOR_URI: http://data.lblod.info/services/id/decisions-ghent-consumer
      INGEST_GRAPH: http://mu.semte.ch/graphs/oslo-decisions/landing
      DCR_DISABLE_INITIAL_SYNC: false
      DCR_DISABLE_DELTA_INGEST: true
      BYPASS_MU_AUTH_FOR_EXPENSIVE_QUERIES: true
      DCR_BATCH_SIZE: 5000
      SLEEP_BETWEEN_BATCHES: 5
    labels:
      - logging=true
    restart: always
    logging: *default-logging