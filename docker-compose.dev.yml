networks:
  debug:
    driver: bridge
    name: debug
services:
  identifier:
    ports:
      - "80:80"
    restart: "no"
  dispatcher:
    restart: "no"
    networks:
      - default
      - debug
  database:
    restart: "no"
    networks:
      - default
      - debug
  dcat:
    restart: "no"
  virtuoso:
    restart: "no"
    networks:
      - default
      - debug
  resource:
    restart: "no"
  file:
    restart: "no"
  odrl-parser:
    restart: "no"
  vc-issuer:
    restart: "no"
  mocklogin:
    image: lblod/mock-login-service:0.7.0
  migrations:
    restart: "no"
  deltanotifier:
    restart: "no"
  frontend-yasgui:
    restart: "no"
  frontend-dcat:
    restart: "no"
  frontend-human-validator:
    restart: "no"
  frontend-harvesting:
    restart: "no"
  oparl-to-eli:
    restart: "no"
  lokaal-beslist-consumer:
    restart: no
  decisions-ghent-filter:
    restart: no
  oslo-eli-transformer:
    restart: no
  job-controller:
    restart: no
  harvest_diff:
    restart: no
  harvest_sameas:
    restart: no
  login:
    restart: no
  entity-linking:
    restart: "no"
  pdf-content:
    restart: "no"
  apache-tika:
    restart: "no"
  question-answering:
    restart: "no"
  search:
    restart: no
    profiles:
      - search
  elasticsearch:
    restart: no
    profiles:
      - search
  embedding:
    restart: no
    profiles:
      - search
  ollama:
    restart: no
    profiles:
      - search
  kibana:
    restart: no
    profiles:
      - search
    image: docker.elastic.co/kibana/kibana:9.2.0
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - 127.0.0.1:5601:5601
    user: root
    command: |
      sh -c "/usr/local/bin/kibana-docker --allow-root;"
