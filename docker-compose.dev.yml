networks:
  debug:
    driver: bridge
    name: debug
services:
  identifier:
    ports:
      - "80:80"
    restart: "no"
  dispatcher:
    restart: "no"
    networks:
      - default
      - debug
  database:
    restart: "no"
    networks:
      - default
      - debug
  virtuoso:
    ports:
      - "8890:8890"
    restart: "no"
    networks:
      - default
      - debug
  resource:
    restart: "no"
  file:
    restart: "no"
  mocklogin:
    image: lblod/mock-login-service:0.7.0
  migrations:
    restart: "no"
  lokaal-beslist-consumer:
    restart: no
  decisions-ghent-filter:
    restart: no