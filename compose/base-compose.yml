x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'
services:
  identifier:
    image: semtech/mu-identifier:1.11.0
    environment:
      DEFAULT_MU_AUTH_ALLOWED_GROUPS_HEADER: '[{"variables":[],"name":"public"}]'
      DEFAULT_ACCESS_CONTROL_ALLOW_ORIGIN_HEADER: '*'
      SESSION_COOKIE_SECURE: 'true'
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  dispatcher:
    image: semtech/mu-dispatcher:2.1.0-beta.2
    volumes:
      - ../config/dispatcher:/config
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  database:
    image: semtech/sparql-parser:feature-odrl-configuration
    environment:
      LISP_DYNAMIC_SPACE_SIZE: 8192
    volumes:
      - ../config/authorization:/config
      - ../data/authorization:/data
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  virtuoso:
    image: redpencil/virtuoso:1.4.0
    environment:
      SPARQL_UPDATE: 'true'
    volumes:
      - ../config/virtuoso/virtuoso.ini:/data/virtuoso.ini
      - ../data/db:/data
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  resource:
    image: semtech/mu-cl-resources:1.27.2
    environment:
      CACHE_CLEAR_PATH: 'http://cache/.mu/clear-keys'
    volumes:
      - ../config/resources:/config
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  cache:
    image: semtech/mu-cache:2.0.1
    links:
      - resource:backend
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  file:
    image: semtech/mu-file-service:3.4.0
    volumes:
      - ../data/files:/share
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  project-scripts:
    image: semtech/simple-script-store:1.0.0
    volumes:
      - ../scripts/:/app/scripts/
    restart: 'no'
  migrations:
    image: semtech/mu-migrations-service:0.9.0
    environment:
      MU_SPARQL_ENDPOINT: http://virtuoso:8890/sparql
    volumes:
      - ../config/migrations:/data/migrations
  deltanotifier:
    image: semtech/mu-delta-notifier:0.4.0
    volumes:
      - ../config/delta:/config
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
  sink:
    image: nginx:1.15.2
    volumes:
      - ../config/sink/sink.conf:/etc/nginx/conf.d/default.conf
    labels:
      - 'logging=true'
    restart: always
    logging: *default-logging
